{% set name = "neper" %}
{% set version = "5.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/neperfepx/neper/archive/v{{ version }}.tar.gz
  sha256: b6bc63db2f1090b0a78117d43bc3be823960b46f04b4b8978a81b7dd1c06dccc

build:
  number: 0
  skip: true  # [win]

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - cmake
    - make
  host:
    - libblas
    - llvm-openmp  # [osx]
    - libgomp  # [linux]
    - gsl
    - scotch <7
    - nlopt
  run:
    - gsl
    - scotch <7
    - nlopt
    - gmsh

test:
  commands:
    - test -f $PREFIX/bin/neper
    - neper --help  # [build_platform == target_platform]
    - neper -T -n 10 -reg 1  # [build_platform == target_platform]

about:
  home: http://neper.info/
  license: GPL-3.0-only
  license_family: GPL
  license_file:
    - COPYING
    - CREDITS
  summary: Neper is a software package for polycrystal generation and meshing.
  doc_url: https://neper.info
  dev_url: https://github.com/neperfepx/neper

extra:
  recipe-maintainers:
    - npavlovikj
    - lang-m
